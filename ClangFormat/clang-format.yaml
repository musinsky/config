# 2026-03-03
# https://github.com/musinsky/config/blob/master/ClangFormat/clang-format.yaml

# $ clang-format --dump-config --style=google > clang-format.Google
# $ clang-format --dump-config                > clang-format.user

BasedOnStyle: Google
# all AlignConsecutiveXYZ styles are disabled in Google style
AlignConsecutiveAssignments: Consecutive   # Google, O2: None
AlignTrailingComments: Leave               # Google, O2: Always
BreakBeforeBraces: Linux                   # Google: Attach, O2: Linux
ColumnLimit: 120                           # Google: 80, O2: 0
ConstructorInitializerIndentWidth: 2       # Google: 4,  O2: 2
ContinuationIndentWidth: 2                 # Google: 4,  O2: 2
# SpacesBeforeTrailingComments ignore if AlignTrailingComments: Leave
# SpacesBeforeTrailingComments: 1          # Google: 2,  O2: 1
TabWidth: 2                                # Google: 8,  O2: 2
